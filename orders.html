<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Zentrix Designs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Admin specific styles */
        body { background-color: #050505; color: #e0e0e0; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: rgba(10, 15, 25, 0.95); border-right: 1px solid rgba(0, 255, 255, 0.2); padding: 2rem; display: flex; flex-direction: column; }
        .sidebar-nav { margin-top: 3rem; flex: 1; list-style: none; padding: 0; }
        .sidebar-nav li { margin-bottom: 1rem; }
        .sidebar-nav a { color: #8892b0; text-decoration: none; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; padding: 0.5rem; border-radius: 4px; transition: all 0.3s ease; }
        .sidebar-nav a:hover, .sidebar-nav a.active { color: #00f0ff; background: rgba(0, 240, 255, 0.1); }
        .main-content { flex: 1; padding: 2rem 4rem; overflow-y: auto; }
        
        .admin-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 2rem; border-radius: 8px; margin-bottom: 2rem; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .data-table th { color: #00f0ff; font-family: 'Orbitron', sans-serif; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        .data-table tr:hover { background: rgba(255, 255, 255, 0.02); }
        
        .action-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .controls { display: flex; gap: 10px; }
        .btn-small { padding: 0.5rem 1rem; font-size: 0.8rem; }
        .btn-danger { border-color: #ff3366; color: #ff3366; }
        .btn-danger:hover { background: rgba(255, 51, 102, 0.2); box-shadow: 0 0 10px rgba(255, 51, 102, 0.4); }
        
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #050505; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: rgba(15, 20, 31, 0.95); border: 1px solid rgba(0, 240, 255, 0.3); padding: 3rem; border-radius: 8px; width: 400px; text-align: center; box-shadow: 0 0 30px rgba(0, 240, 255, 0.1); }
        .auth-box h2 { font-family: 'Orbitron', sans-serif; color: #00f0ff; margin-bottom: 2rem; }
        .auth-box input { width: 100%; padding: 1rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 1.5rem; text-align: center; font-size: 1.2rem; letter-spacing: 2px; }
        .auth-box input:focus { border-color: #00f0ff; outline: none; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <!-- Admin Auth -->
    <div id="adminAuthOverlay" class="auth-overlay">
        <div class="auth-box">
            <h2>SYS_ADMIN AUTH</h2>
            <form id="adminAuthForm">
                <input type="password" id="adminPassword" placeholder="ACCESS KEY" required>
                <button type="submit" class="cyber-btn primary-btn w-100">Initialize Bypass</button>
            </form>
            <p id="authErrorMsg" style="color: #ff3366; margin-top: 1rem; display: none;">ACCESS DENIED</p>
            <p class="mt-2" style="font-size: 0.8rem;"><a href="index.html" style="color: #8892b0;">Return to Surface Web</a></p>
        </div>
    </div>

    <!-- User Orders View Container -->
    <div class="admin-layout" id="userOrdersDashboard" style="display: flex; justify-content: center; align-items: start; padding-top: 4rem; min-height: 80vh;">
        <div class="admin-card" style="width: 100%; max-width: 800px; margin: 0 auto; background: rgba(15, 20, 31, 0.8);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding-bottom: 1rem;">
                <h1 class="orbitron neon-text" style="font-size: 1.8rem;">My Transmissions <i class="fa-solid fa-clock-rotate-left glow-icon"></i></h1>
                <a href="shop.html" class="cyber-btn outline-btn"><i class="fa-solid fa-arrow-left"></i> Back to Repository</a>
            </div>
            
            <div id="fullUserOrdersList">
                <!-- User's orders injected by app.js -->
                <p style="text-align: center; color: var(--text-secondary);">Scanning blockchain for user history...</p>
            </div>
        </div>
    </div>

    
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <!-- Firebase Firestore -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
      (function(){
         emailjs.init({
           publicKey: "LfX8WGw9vtGzGoMpF",
         });
      })();
    </script>

    <script src="js/app.js"></script>
</body>
</html>
